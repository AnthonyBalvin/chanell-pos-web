<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="chanellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Fondo azul marino corporativo -->
  <rect width="64" height="64" rx="14" ry="14" fill="#1e2a4a"/>

  <!-- Letra "C" con degradado rosa→azul -->
  <text
    x="32"
    y="47"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="46"
    text-anchor="middle"
    fill="url(#chanellGrad)"
  >C</text>
</svg>